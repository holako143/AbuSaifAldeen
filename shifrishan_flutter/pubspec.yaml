name: shifrishan_flutter
description: A native Flutter application for secure steganography and encryption.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Crypto & Security
  cryptography: ^2.5.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6

  # Data & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Image & Files
  image: ^4.1.3
  file_picker: ^6.1.1
  share_plus: ^7.2.2
  archive: ^3.4.10

  # UI & UX
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  intl: ^0.19.0
  lucide_icons: ^0.301.0
  flutter_spinkit: ^5.2.0
  animate_do: ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
